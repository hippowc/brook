# Brook 配置示例（v2）
# 详见 config/docs/agent-configuration-guide.md

version: "2"

agent:
  mode: react
  name: "brook-assistant"
  description: "Brook assistant"
  instruction: |
    你是 Brook 助手，请以准确、简洁方式响应。
  user_prompt: ""
  max_iterations: 24
  working_directory: "/absolute/path/to/workspace"
  tools:
    filesystem:
      enabled: true
      backend: local
      shell: true
      streaming_shell: false
      local:
        strict_commands: true
    return_directly: {}
  middlewares: []

agents:
  writer:
    name: writer
    instruction: "你负责起草方案"
  reviewer:
    name: reviewer
    instruction: "你负责评审方案"
  planner:
    name: planner
    instruction: "你负责规划"
  executor:
    name: executor
    instruction: "你负责执行"

modes:
  deep:
    agent_ids: [writer, reviewer]
  sequential:
    agent_ids: [writer, reviewer]
  parallel:
    agent_ids: [writer, reviewer]
  loop:
    agent_ids: [writer]
    max_iterations: 3
  supervisor:
    supervisor_id: planner
    worker_ids: [writer, reviewer]
  plan_execute:
    planner_id: planner
    executor_id: executor
    replanner_id: planner
  custom:
    script: "@./custom/orchestrate.star"
    agents_file: "@./custom/agents.yaml"
    params:
      random_seed: 1

models:
  providers:
    openai:
      driver: openai
      api_key_env: OPENAI_API_KEY
      base_url: ""
      extra:
        temperature: 0.2
  active:
    provider: openai
    model: gpt-4o-mini

memory:
  session_store: file
  session_file_path: "/absolute/path/to/.brook/session.json"
  max_context_messages: 50
  output_key: last_answer

observability:
  global_handlers: []
  log_level: info

interrupt:
  enabled: true
  checkpoint_backend: file
  checkpoint_file_path: "/absolute/path/to/.brook/checkpoints"

a2ui:
  enabled: false
  version: "0.8"

gateway:
  enabled: false
  listen: ":8787"
