# Brook 默认配置（首次运行写入 ~/.brook/agent.yaml）
# 配置说明见 config/docs/agent-configuration-guide.md。

version: "2"

agent:
  mode: react
  name: "brook-assistant"
  description: "Brook 助手（ReAct + 本地文件工具）"
  instruction: |
    你是 Brook 助手。工作目录为会话配置的工作目录；仅使用已提供的工具完成任务。
  user_prompt: ""
  max_iterations: 24
  working_directory: "__WORKSPACE__"
  tools:
    filesystem:
      enabled: true
      backend: local
      shell: true
      streaming_shell: false
      local:
        strict_commands: true
    return_directly: {}
  middlewares: []

agents: {}

modes:
  deep: {}
  sequential:
    agent_ids: ["step_a", "step_b"]
  parallel:
    agent_ids: ["step_a", "step_b"]
  loop:
    agent_ids: ["loop_worker"]
    max_iterations: 5
  supervisor:
    supervisor_id: "supervisor"
    worker_ids: ["worker_1"]
  plan_execute:
    planner_id: "planner"
    executor_id: "executor"
    replanner_id: "planner"
  custom:
    script: ""
    agents_file: ""
    params: {}

models:
  providers:
    openai:
      driver: openai
      api_key_env: "OPENAI_API_KEY"
      base_url: ""
      extra:
        temperature: 0.2
    ollama:
      driver: ollama
      api_key_env: ""
      base_url: "http://127.0.0.1:11434"
      extra: {}
  active:
    provider: openai
    model: "gpt-4o-mini"

memory:
  session_store: file
  session_file_path: "__SESSION__"
  max_context_messages: 50
  output_key: "last_answer"

observability:
  global_handlers: []
  log_level: "info"

interrupt:
  enabled: true
  checkpoint_backend: file
  checkpoint_file_path: "__CHECKPOINTS__"

a2ui:
  enabled: false
  version: "0.8"

gateway:
  enabled: false
  listen: ":8787"
